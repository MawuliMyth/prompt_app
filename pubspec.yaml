name: promt_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  provider: ^6.1.5+1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  flutter_sound: ^9.0.0
  path_provider: ^2.1.0
  http: ^1.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  google_fonts: ^8.0.2
  lottie: ^3.3.2
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.3
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3


flutter:


  uses-material-design: true

  # App assets (logo, images, etc.)
  assets:
    - assets/images/

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/images/w.png"
  min_sdk_android: 21

